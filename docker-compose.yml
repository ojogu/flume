name: Flume

networks:
  observability:
    driver: bridge
  app:
    driver: bridge

volumes:
  grafana_data:
  loki_data:
  tempo_data:
  prometheus_data:

services:

  # ── App Services ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: prod
    ports:
      - "127.0.0.1:5174:80"
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - app
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
          
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5001:5000"
    env_file:
      - ./backend/.env
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      cache:
        condition: service_started
      queue:
        condition: service_started
      otel-collector:
        condition: service_started
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/src:/app/src
    command: uvicorn src.main:app --host 0.0.0.0 --port 5000 --reload 
    networks:
      - observability
      - app

  worker:
    build:
      context: ./backend
    command: celery -A celery.celery.bg_task worker -l info -Q default,email
    env_file:
      - ./backend/.env
    environment:
      - CELERY_WORKER=true
      - CELERYD_CONCURRENCY=2
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    depends_on:
      cache:
        condition: service_started
      queue:
        condition: service_started
      otel-collector:
        condition: service_started
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/src:/app/src
    networks:
      - observability

  celery-beat:
    build:
      context: ./backend
    command: celery -A celery.celery.bg_task beat -l info
    env_file:
      - ./backend/.env
    environment:
      - CELERY_WORKER=true
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      - cache
      - queue
    networks:
      - observability

  flower:
    build:
      context: ./backend
    command: celery -A celery.celery.bg_task flower --port=5555
    env_file:
      - ./backend/.env
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    ports:
      - "5555:5555"
    depends_on:
      - cache
      - queue
    networks:
      - observability


  
  # ── Infrastructure ────────────────────────────────────────────────
  cache:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - observability
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  queue:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "15673:15672"
    networks:
      - observability
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── Observability Stack ───────────────���──────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    # container_name: otel-collector
    volumes:
      - ./backend/observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    healthcheck:
      disable: true
    depends_on:
      - loki
      - tempo
      - prometheus
    networks:
      - observability
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  loki:
    image: grafana/loki:3.0.0
    # container_name: loki
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./backend/observability/loki.yaml:/etc/loki/config.yaml
      - loki_data:/loki
    networks:
      - observability
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  tempo:
    image: grafana/tempo:2.4.1
    # container_name: tempo
    command: -config.file=/etc/tempo/config.yaml
    volumes:
      - ./backend/observability/tempo.yaml:/etc/tempo/config.yaml
      - tempo_data:/var/tempo
    networks:
      - observability
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  prometheus:
    image: prom/prometheus:v2.51.0
    # container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
    volumes:
      - ./backend/observability/prometheus.yaml:/etc/prometheus/prometheus.yaml
      - prometheus_data:/prometheus
    networks:
      - observability
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  grafana:
    image: grafana/grafana:10.4.2
    # container_name: grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./backend/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    ports:
      - "3001:3000"
    depends_on:
      - loki
      - tempo
      - prometheus
    networks:
      - observability
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M